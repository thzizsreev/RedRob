encoder:
  model_name: sentence-transformers/gtr-t5-base

decoder:
  embedder_id: gtr-base
  num_steps: 10
  sequence_beam_width: 2

phase_a:
  decode_repeats: 5
  sentences:
    - id: S1
      text: >-
        Seven years of production experience building FAISS and Qdrant based
        hybrid search systems at a fintech product company.
    - id: S2
      text: >-
        This candidate has no production deployment experience and has only
        worked in academic research labs.
    - id: S3
      text: >-
        Strong recruiter engagement with a ninety one percent response rate
        and active platform use this week.
    - id: S4
      text: >-
        The candidate's notice period of one hundred twenty days is a
        significant logistical concern for this role.
    - id: S5
      text: >-
        Five years at a consulting firm with no exposure to embeddings,
        retrieval, or ranking systems.

phase_b:
  sweep_repeats: 3
  s_values: [-0.25, 0.0, 0.25, 0.5, 0.75, 1.0, 1.25]
  anchors:
    bad: >-
      This candidate's technical experience is completely unsuitable for the role.
    good: >-
      This candidate's technical experience is exceptionally well suited for the role.
    base: >-
      This candidate has technical experience in machine learning.
